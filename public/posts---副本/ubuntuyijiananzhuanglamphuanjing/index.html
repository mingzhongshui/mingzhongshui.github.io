          <h1 class="title">Ubuntu一键安装LAMP环境</h1>
          <div class="meta">Posted on May 4, 2017</div>
        </div>
        
        <section class="body">
          <p>    <code>ubuntu</code>是一款以桌面应用为主的开源<code>linux</code>操作系统，作为初学者学习<code>linux</code>操作系统，也更为简单和容易上手。在<code>Ubuntu</code>上搭建<code>lamp</code>系统的方式有很多，这里就介绍一种最简单高效的安装方法；</p>
<ol>
<li>
<p><code>apt-get update</code> 更新<code>apt-get</code>命令</p>
</li>
<li>
<p><code>tasksel install lamp-server</code> 一键安装<code>lamp</code>环境，自动下载当前最新版本</p>
</li>
</ol>
<p>以上，OK！</p>
